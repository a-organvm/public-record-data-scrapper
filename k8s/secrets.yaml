apiVersion: v1
kind: Secret
metadata:
  name: ucc-mca-secrets
  namespace: ucc-mca
  labels:
    app.kubernetes.io/name: ucc-mca-platform
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # IMPORTANT: Replace these values in production!
  # Use kubectl create secret or external secrets management

  DATABASE_URL: "postgresql://user:password@postgres-host:5432/ucc_mca?sslmode=require"
  REDIS_URL: "rediss://user:password@redis-host:6379"
  JWT_SECRET: "REPLACE_WITH_SECURE_RANDOM_STRING_IN_PRODUCTION"
  AUTH0_CLIENT_SECRET: "REPLACE_WITH_AUTH0_CLIENT_SECRET"

  # Webhook verification secrets. Production startup fails closed when these
  # are absent, and individual verifiers return 401 when unconfigured.
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_SECRET_KEY"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_STRIPE_WEBHOOK_SECRET"
  TWILIO_AUTH_TOKEN: "REPLACE_WITH_TWILIO_AUTH_TOKEN"
  SENDGRID_WEBHOOK_VERIFICATION_KEY: "REPLACE_WITH_SENDGRID_PUBLIC_VERIFICATION_KEY"

  # Plaid webhook verification uses ES256/JWK lookup via these API credentials.
  PLAID_CLIENT_ID: "REPLACE_WITH_PLAID_CLIENT_ID"
  PLAID_SECRET: "REPLACE_WITH_PLAID_SECRET"

  # External API keys (optional)
  # OPENAI_API_KEY: ""
  # ANTHROPIC_API_KEY: ""

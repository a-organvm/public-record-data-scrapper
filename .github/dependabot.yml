version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/desktop"
      - "/apps/mobile"
      - "/apps/web"
      - "/packages/core"
      - "/packages/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-deps:
        patterns: ["*"]
  - package-ecosystem: "docker"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      docker-deps:
        patterns: ["*"]
  - package-ecosystem: "cargo"
    directories:
      - "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      cargo-deps:
        patterns: ["*"]

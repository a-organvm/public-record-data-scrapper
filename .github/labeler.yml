docs:
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "**/*.md"]

ci:
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**"]

frontend:
  - changed-files:
      - any-glob-to-any-file: ["apps/**", "packages/**"]

backend:
  - changed-files:
      - any-glob-to-any-file: ["server/**", "database/**"]

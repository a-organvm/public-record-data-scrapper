name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Secret Pattern Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secret patterns
        run: |
          FOUND=0
          # Patterns cover: OpenAI, GitHub PAT, AWS access key, Anthropic,
          # Stripe live/test secret keys, Twilio API key (SK...) and Account SID (AC...),
          # SendGrid API key (SG.), Plaid keys, JWT secrets, and DATABASE_URL with an
          # embedded password.
          patterns=(
            'sk-[a-zA-Z0-9]{20,}'
            'ghp_[a-zA-Z0-9]{36}'
            'AKIA[A-Z0-9]{16}'
            'sk-ant-[a-zA-Z0-9]{20,}'
            'sk_live_[0-9a-zA-Z]{20,}'
            'sk_test_[0-9a-zA-Z]{20,}'
            'rk_live_[0-9a-zA-Z]{20,}'
            'SK[0-9a-fA-F]{32}'
            'AC[0-9a-fA-F]{32}'
            'SG\.[A-Za-z0-9_-]{16,}\.[A-Za-z0-9_-]{16,}'
            'access-(sandbox|development|production)-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
            '(JWT_SECRET|JWT_PRIVATE_KEY|JWT_REFRESH_SECRET)\s*[:=]\s*["'"'"']?[A-Za-z0-9+/_=-]{16,}'
            'postgres(ql)?://[^:@/\s]+:[^@/\s]+@'
          )
          # Exclusions: tooling dirs plus known dev-only credential files (local
          # docker-compose and example env) that intentionally carry placeholder
          # postgres/postgres credentials.
          EXCLUDES=(':!.github' ':!node_modules' ':!.venv' ':!docker-compose.yml' ':!**/*.example' ':!.env.example')
          for pattern in "${patterns[@]}"; do
            if git grep -lP "$pattern" -- "${EXCLUDES[@]}" 2>/dev/null; then
              echo "::error::Potential secret pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No secret patterns detected"

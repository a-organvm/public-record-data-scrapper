name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '36 17 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: Checkout repository
        # actions/checkout v4.3.0
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Initialize CodeQL
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/init@v3.27.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/autobuild@v3.27.0

      - name: Perform CodeQL Analysis
        # TODO: SHA-pin this action (could not resolve offline). Pin github/codeql-action to a full release SHA.
        uses: github/codeql-action/analyze@v3.27.0
